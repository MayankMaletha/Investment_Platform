# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Full development + production stack
#
# Services:
#   api        — FastAPI application (this repo)
#   postgres   — Primary relational database
#   redis      — Cache layer + session store
#   chromadb   — Vector database for RAG and memory
#
# Usage:
#   Development:  docker compose up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: investment_agent_api
    ports:
      - "8080:8080"
    environment:
      # Override via .env file or environment variables in CI/CD
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/investment_agent
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - LOG_FORMAT=text
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount source for hot reload in development
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - investment_network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload --log-level debug

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: investment_agent_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investment_agent
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - investment_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d investment_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: investment_agent_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - investment_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ChromaDB ───────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: investment_agent_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - investment_network
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    restart: unless-stopped

  # ── Alembic Migration Runner (one-shot) ────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: investment_agent_migrate
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/investment_agent
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - investment_network
    profiles:
      - migrate  # Only runs with: docker compose --profile migrate up migrate

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  investment_network:
    driver: bridge
